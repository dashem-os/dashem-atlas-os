name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  typecheck-core:
    name: Build & Typecheck Core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Core
        run: npx tsc -b core/shared core/events core/database core/security core/observability

  typecheck-modules:
    name: Build & Typecheck Modules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Modules
        run: npx tsc -b modules/auth modules/organizations modules/assets modules/maintenance modules/construction modules/workflow modules/timeline modules/ai modules/operations modules/monitoring modules/notifications modules/reports

  typecheck-apps:
    name: Build & Typecheck Apps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Apps
        run: npx tsc -b apps/api apps/field apps/worker apps/web
