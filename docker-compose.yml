services:
  postgres:
    image: postgres:16-alpine
    container_name: atlas-postgres
    environment:
      POSTGRES_DB: atlas_os
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas_dev
    ports:
      - "55432:5432"
    volumes:
      - atlas_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas_os"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  atlas_postgres_data:
